seed: 42
baseline: graph_sage

graph:
  source: rdkit


data:
  descriptor_csv: data/3-Opt_XGB_descriptor.csv
  graph_pkl: data/all_data_ID-smiles-graph-13320.pkl
  split_csv: data/splits/split_seed42.csv
  id_column: ID
  smiles_column: smiles
  target_column: target
  descriptor_exclude_columns:
    - ID
    - smiles
    - target
    - adsorption_energy
    - log2(AE)

model:
  node_input_dim: 18
  hidden_size: 128
  gnn_layers: 3
  dropout: 0.1

training:
  output_dir: outputs_graph_debug/g4_rdkit_rich_sage
  device: auto
  batch_size: 64
  epochs: 200
  learning_rate: 0.001
  weight_decay: 0.00001
  patience: 30
  num_workers: 0
  max_length: 64
